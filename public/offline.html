<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRO WORLD ARENA — Sem conexão</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1A1C22;
      color: #F2F2F2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 2rem;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.05em;
      margin-bottom: 2rem;
    }
    .logo span { color: #FF6A00; }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.4;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    p {
      color: #9CA3AF;
      font-size: 0.9rem;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: #FF6A00;
      color: #000;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-weight: 900;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .status {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="logo">PRO WORLD <span>ARENA</span></div>
  <div class="icon">📡</div>
  <h1>Sem conexão</h1>
  <p>Você está offline. Verifique sua conexão com a internet e tente novamente.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
  <p class="status">Os dados salvos localmente continuam disponíveis</p>

  <script>
    // Voltar automaticamente quando recuperar conexão
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
